name: ShieldCI PR Security Audit

# This tells GitHub to ONLY run this when a developer opens or updates a Pull Request
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  agentic-scan:
    # This routes the job away from GitHub's cloud and directly to your laptop!
    runs-on: self-hosted 

    steps:
      - name: 📥 Checkout Pull Request Code
        uses: actions/checkout@v4

     - name: 🚀 Boot CI/CD Staging Server (Node.js)
        run: |
          echo "Booting the PR code into an ephemeral staging environment..."
          npm install
          # Start the dev server in the background
          npm run dev &
          # Give the JS bundler a few seconds to compile and start
          sleep 5
      - name: 🧠 Fetch & Run ShieldCI Agent
        run: |
          # 1. Download your DevSecOps Engine from your main repo
          # CHANGE 'YOUR_USERNAME' TO YOUR ACTUAL GITHUB USERNAME!
          git clone https://github.com/YOUR_USERNAME/shieldci-engine.git shield-engine
          
          # 2. Trigger the AI attack
          cd shield-engine
          python3 ai_attacker.py
